<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Polyphonic Synthesizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <div id="header">
            <h1>Generative Synthesizer</h1>
            <p>An instrument that conducts a conversation between musical entities.</p>
        </div>

        <div id="controls-panel">
            <div id="master-controls">
                <button id="start-stop-btn">Start</button>
            </div>
            <div id="synth-params">
                <!-- Creative Control Parameters will be injected here by JS -->
            </div>
        </div>
        
        <div id="visualizer-container">
            <!-- Voices will be visualized here -->
        </div>

    </div>

    <script src="synth.js"></script>
</body>
</html>
